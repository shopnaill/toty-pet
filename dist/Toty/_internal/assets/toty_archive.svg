<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background rounded square -->
  <rect x="16" y="16" width="224" height="224" rx="32" ry="32" fill="#1E1E2E"/>
  <rect x="16" y="16" width="224" height="224" rx="32" ry="32" fill="none" stroke="#45475A" stroke-width="4"/>

  <!-- Archive box body -->
  <rect x="48" y="80" width="160" height="120" rx="12" ry="12" fill="#313244" stroke="#89B4FA" stroke-width="3"/>

  <!-- Box lid -->
  <path d="M40 88 L128 48 L216 88 L216 96 L128 64 L40 96 Z" fill="#89B4FA"/>
  <path d="M40 88 L128 48 L216 88" fill="none" stroke="#B4BEFE" stroke-width="2"/>

  <!-- Zipper stripe down center -->
  <rect x="120" y="88" width="16" height="112" fill="#45475A"/>
  <rect x="122" y="92" width="12" height="10" rx="2" fill="#89B4FA"/>
  <rect x="122" y="108" width="12" height="10" rx="2" fill="#89B4FA"/>
  <rect x="122" y="124" width="12" height="10" rx="2" fill="#89B4FA"/>
  <rect x="122" y="140" width="12" height="10" rx="2" fill="#89B4FA"/>
  <rect x="122" y="156" width="12" height="10" rx="2" fill="#89B4FA"/>
  <rect x="122" y="172" width="12" height="10" rx="2" fill="#89B4FA"/>

  <!-- Toty eyes on box -->
  <ellipse cx="88" cy="130" rx="16" ry="18" fill="#CDD6F4"/>
  <ellipse cx="168" cy="130" rx="16" ry="18" fill="#CDD6F4"/>
  <ellipse cx="90" cy="132" rx="8" ry="10" fill="#1E1E2E"/>
  <ellipse cx="170" cy="132" rx="8" ry="10" fill="#1E1E2E"/>
  <!-- Eye shine -->
  <circle cx="93" cy="128" r="3" fill="#FFFFFF"/>
  <circle cx="173" cy="128" r="3" fill="#FFFFFF"/>

  <!-- Cute blush -->
  <ellipse cx="72" cy="148" rx="10" ry="6" fill="#F38BA8" opacity="0.3"/>
  <ellipse cx="184" cy="148" rx="10" ry="6" fill="#F38BA8" opacity="0.3"/>

  <!-- Small smile -->
  <path d="M110 155 Q128 170 146 155" fill="none" stroke="#CDD6F4" stroke-width="3" stroke-linecap="round"/>

  <!-- Toty text -->
  <text x="128" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#89B4FA">TOTY</text>
</svg>
